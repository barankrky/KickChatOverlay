name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Publish
      run: dotnet publish src/KickChatOverlay/KickChatOverlay.csproj -c Release -r win-x64 --self-contained true -o publish

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Set version
      shell: pwsh
      run: echo "version=$($env:TAG -replace '^v','')" >> $env:GITHUB_ENV
      env:
        TAG: ${{ github.ref_name }}

    - name: Build installer
      run: iscc installer/KickChatOverlay.iss /DMyAppVersion=${{ env.version }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: installer/output/*.exe
